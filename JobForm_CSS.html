<!-- ==========================================================
ASJ JOB SYSTEM V3
File : JobForm_CSS.html
=========================================================== -->

<style>

/*==========================================================
ROOT
==========================================================*/

:root{

    --primary:#16a34a;
    --primary-dark:#15803d;

    --danger:#dc2626;
    --danger-dark:#b91c1c;

    --secondary:#64748b;
    --secondary-dark:#475569;

    --background:#f4f6f9;

    --card:#ffffff;

    --border:#dbe3eb;

    --text:#1e293b;

    --muted:#64748b;

    --shadow:

        0 10px 25px rgba(0,0,0,.08);

    --radius:14px;

}

/*==========================================================
RESET
==========================================================*/

*{

    margin:0;

    padding:0;

    box-sizing:border-box;

}

html{

    height:100%;

}

body{

    min-height:100vh;

    font-family:

        "Segoe UI",

        Arial,

        sans-serif;

    background:

        var(--background);

    color:

        var(--text);

}

/*==========================================================
APP
==========================================================*/

.app{

    width:100%;

    display:flex;

    justify-content:center;

    padding:28px;

}

/*==========================================================
CARD
==========================================================*/

.card{

    width:100%;

    max-width:980px;

    background:

        var(--card);

    border-radius:

        var(--radius);

    box-shadow:

        var(--shadow);

    overflow:hidden;

}

/*==========================================================
HEADER
==========================================================*/

.card-header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:

        22px 28px;

    background:

        linear-gradient(

            90deg,

            #16a34a,

            #22c55e

        );

    color:#fff;

}

.header-left{

    display:flex;

    align-items:center;

    gap:18px;

}

.logo{

    width:58px;

    height:58px;

    border-radius:50%;

    background:#ffffff22;

    display:flex;

    align-items:center;

    justify-content:center;

    font-size:30px;

}

.header-left h1{

    font-size:24px;

    font-weight:700;

}

.header-left p{

    margin-top:4px;

    font-size:13px;

    opacity:.92;

}

/*==========================================================
HEADER RIGHT
==========================================================*/

.header-right{

    text-align:right;

}

.badge{

    display:inline-block;

    padding:

        6px 12px;

    border-radius:30px;

    background:#ffffff22;

    font-size:12px;

    font-weight:700;

    letter-spacing:.8px;

}

.version{

    margin-top:8px;

    font-size:13px;

    opacity:.9;

}

/*==========================================================
INFO BAR
==========================================================*/

.info-bar{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:

        12px 28px;

    background:#f8fafc;

    border-bottom:

        1px solid var(--border);

    font-size:13px;

    color:

        var(--muted);

}

/*==========================================================
BODY
==========================================================*/

.card-body{

    padding:28px;

}

#formArea{

    display:flex;

    flex-direction:column;

    gap:16px;

}

.row{

    display:grid;

    grid-template-columns:

        220px

        1fr;

    gap:16px;

    align-items:start;

}

.row label{

    font-weight:600;

    padding-top:12px;

}

.required{

    color:

        #dc2626;

}

/*==========================================================
INPUT
PART 2 / 4
==========================================================*/

input,
textarea{

    width:100%;

    border:1px solid var(--border);

    border-radius:10px;

    padding:12px 14px;

    font-size:14px;

    background:#fff;

    color:var(--text);

    transition:.25s;

}

input:hover,
textarea:hover{

    border-color:#94a3b8;

}

input:focus,
textarea:focus{

    outline:none;

    border-color:var(--primary);

    box-shadow:

        0 0 0 3px rgba(22,163,74,.15);

}

textarea{

    resize:vertical;

    min-height:110px;

}

/*==========================================================
SEARCH SELECT
==========================================================*/

.search-select{

    position:relative;

    width:100%;

}

.search-list{

    position:absolute;

    left:0;

    right:0;

    top:100%;

    margin-top:6px;

    background:#fff;

    border:1px solid var(--border);

    border-radius:10px;

    overflow:hidden;

    max-height:220px;

    overflow-y:auto;

    z-index:100;

    box-shadow:

        0 8px 20px rgba(0,0,0,.12);

}

.search-item{

    padding:10px 14px;

    cursor:pointer;

    transition:.15s;

    font-size:14px;

}

.search-item:hover{

    background:#ecfdf5;

    color:var(--primary-dark);

}

.search-empty{

    padding:14px;

    text-align:center;

    color:var(--muted);

}

/*==========================================================
MULTI SELECT
==========================================================*/

.multi-select{

    position:relative;

}

.multi-list{

    position:absolute;

    left:0;

    right:0;

    top:100%;

    margin-top:6px;

    background:#fff;

    border:1px solid var(--border);

    border-radius:10px;

    max-height:260px;

    overflow-y:auto;

    box-shadow:

        0 8px 20px rgba(0,0,0,.12);

    z-index:200;

}

.check-item{

    display:flex;

    align-items:center;

    gap:10px;

    padding:10px 14px;

    cursor:pointer;

    transition:.15s;

}

.check-item:hover{

    background:#f0fdf4;

}

.check-item input{

    width:18px;

    height:18px;

    cursor:pointer;

}

/*==========================================================
CHIPS
==========================================================*/

.chip-container{

    display:flex;

    flex-wrap:wrap;

    gap:8px;

    margin-top:8px;

}

.chip{

    display:flex;

    align-items:center;

    gap:8px;

    background:#dcfce7;

    color:#166534;

    padding:6px 12px;

    border-radius:999px;

    font-size:13px;

    cursor:pointer;

    transition:.2s;

}

.chip:hover{

    background:#bbf7d0;

}

.chip span{

    font-weight:bold;

    font-size:15px;

}

/*==========================================================
SCROLLBAR
==========================================================*/

.search-list::-webkit-scrollbar,
.multi-list::-webkit-scrollbar{

    width:8px;

}

.search-list::-webkit-scrollbar-track,
.multi-list::-webkit-scrollbar-track{

    background:#f1f5f9;

}

.search-list::-webkit-scrollbar-thumb,
.multi-list::-webkit-scrollbar-thumb{

    background:#cbd5e1;

    border-radius:20px;

}

.search-list::-webkit-scrollbar-thumb:hover,
.multi-list::-webkit-scrollbar-thumb:hover{

    background:#94a3b8;

}

/*==========================================================
FOOTER
PART 3 / 4
==========================================================*/

.card-footer{

    display:flex;

    justify-content:flex-end;

    align-items:center;

    gap:12px;

    padding:22px 28px;

    border-top:1px solid var(--border);

    background:#fafafa;

}

/*==========================================================
BUTTON
==========================================================*/

.btn{

    min-width:120px;

    height:44px;

    border:none;

    border-radius:10px;

    cursor:pointer;

    font-size:14px;

    font-weight:600;

    transition:.25s;

    display:flex;

    align-items:center;

    justify-content:center;

    gap:8px;

}

.btn:disabled{

    opacity:.5;

    cursor:not-allowed;

}

/*==========================================================
PRIMARY
==========================================================*/

.btn-primary{

    background:var(--primary);

    color:#fff;

}

.btn-primary:hover{

    background:var(--primary-dark);

    transform:translateY(-1px);

}

/*==========================================================
SECONDARY
==========================================================*/

.btn-secondary{

    background:var(--secondary);

    color:#fff;

}

.btn-secondary:hover{

    background:var(--secondary-dark);

    transform:translateY(-1px);

}

/*==========================================================
DANGER
==========================================================*/

.btn-danger{

    background:var(--danger);

    color:#fff;

}

.btn-danger:hover{

    background:var(--danger-dark);

    transform:translateY(-1px);

}

/*==========================================================
LOADING
==========================================================*/

.loading{

    position:fixed;

    inset:0;

    display:flex;

    align-items:center;

    justify-content:center;

    background:rgba(255,255,255,.70);

    backdrop-filter:blur(2px);

    z-index:99999;

}

.hidden{

    display:none;

}

.loading-card{

    width:280px;

    background:#fff;

    border-radius:16px;

    padding:30px;

    text-align:center;

    box-shadow:

        0 12px 28px rgba(0,0,0,.18);

}

.loading-title{

    margin-top:18px;

    font-size:18px;

    font-weight:700;

    color:var(--text);

}

.loading-subtitle{

    margin-top:8px;

    color:var(--muted);

    font-size:13px;

}

/*==========================================================
SPINNER
==========================================================*/

.spinner{

    width:60px;

    height:60px;

    margin:auto;

    border-radius:50%;

    border:5px solid #e2e8f0;

    border-top-color:var(--primary);

    animation:spin .8s linear infinite;

}

@keyframes spin{

    to{

        transform:rotate(360deg);

    }

}

/*==========================================================
ANIMATION
==========================================================*/

.card{

    animation:fadeIn .25s ease;

}

@keyframes fadeIn{

    from{

        opacity:0;

        transform:translateY(12px);

    }

    to{

        opacity:1;

        transform:translateY(0);

    }

}

/*==========================================================
RESPONSIVE
PART 4 / 4
==========================================================*/

@media (max-width:900px){

    .card{

        max-width:100%;

    }

    .row{

        grid-template-columns:180px 1fr;

    }

}

@media (max-width:768px){

    .app{

        padding:16px;

    }

    .card-header{

        flex-direction:column;

        align-items:flex-start;

        gap:16px;

    }

    .header-right{

        width:100%;

        text-align:left;

    }

    .info-bar{

        flex-direction:column;

        align-items:flex-start;

        gap:8px;

    }

    .row{

        grid-template-columns:1fr;

        gap:8px;

    }

    .row label{

        padding-top:0;

    }

    .card-body{

        padding:20px;

    }

    .card-footer{

        flex-direction:column;

        align-items:stretch;

    }

    .btn{

        width:100%;

    }

}

@media (max-width:480px){

    .app{

        padding:10px;

    }

    .card-header{

        padding:18px;

    }

    .card-body{

        padding:16px;

    }

    .card-footer{

        padding:16px;

    }

    .logo{

        width:46px;

        height:46px;

        font-size:24px;

    }

    .header-left h1{

        font-size:20px;

    }

    .badge{

        font-size:11px;

    }

}

/*==========================================================
PRINT
==========================================================*/

@media print{

    body{

        background:#fff;

    }

    .card{

        box-shadow:none;

        border:1px solid #ccc;

    }

    .card-footer,

    .loading{

        display:none !important;

    }

}

/*==========================================================
UTILITY
==========================================================*/

.text-center{

    text-align:center;

}

.text-right{

    text-align:right;

}

.hidden{

    display:none !important;

}

.w-100{

    width:100%;

}

.mt-1{

    margin-top:8px;

}

.mt-2{

    margin-top:16px;

}

.mb-1{

    margin-bottom:8px;

}

.mb-2{

    margin-bottom:16px;

}

.fw-bold{

    font-weight:700;

}

.cursor-pointer{

    cursor:pointer;

}

/*==========================================================
ASJ COMPACT UI
==========================================================*/

.compact{

    max-width:700px;

}

.card-header{

    padding:16px 20px;

}

.logo{

    width:42px;
    height:42px;
    font-size:22px;

}

.header-left{

    gap:12px;

}

.header-left h1{

    font-size:20px;

}

.header-left p{

    font-size:11px;

}

.badge{

    font-size:10px;

    padding:4px 10px;

}

.version{

    font-size:11px;

}

.info-bar{

    padding:8px 20px;

    font-size:11px;

}

.card-body{

    padding:18px 20px;

}

#formArea{

    gap:10px;

}

.row{

    grid-template-columns:150px 1fr;

    gap:10px;

}

.row label{

    padding-top:8px;

    font-size:13px;

}

input,
textarea{

    padding:8px 10px;

    font-size:13px;

    border-radius:8px;

}

textarea{

    min-height:70px;

}

.search-item{

    padding:8px 10px;

    font-size:12px;

}

.check-item{

    padding:8px 10px;

    font-size:12px;

}

.check-item input{

    width:15px;
    height:15px;

}

.chip{

    padding:4px 8px;

    font-size:11px;

}

.card-footer{

    padding:14px 20px;

}

.btn{

    min-width:95px;

    height:36px;

    font-size:12px;

}

</style>
